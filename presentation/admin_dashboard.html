<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 220px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #2c3e50;
            padding-top: 20px;
            color: white;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        /* Main content */
        .main-content {
            margin-left: 220px;
            padding: 20px;
        }

        /* Top navbar */
        .topnav {
            height: 60px;
            background-color: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #ccc;
        }

        .topnav h1 {
            margin: 0;
            font-size: 24px;
        }

        .topnav .user-info {
            font-size: 16px;
        }

        /* Dashboard cards */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: white;
            flex: 1 1 200px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 20px;
            margin: 0;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Admin Panel</h2>
        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Classes</a>
        <a href="#">Memberships</a>
        <a href="#">Feedback</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <!-- Top navbar -->
        <div class="topnav">
            <h1>Dashboard</h1>
            <div class="user-info">Logged in as Admin</div>
        </div>

        <!-- Dashboard cards -->
        <div class="card-container">
            <div class="card">
                <h3>Total Users</h3>
                <p>150</p>
            </div>
            <div class="card">
                <h3>Active Classes</h3>
                <p>12</p>
            </div>
            <div class="card">
                <h3>New Feedback</h3>
                <p>5</p>
            </div>
            <div class="card">
                <h3>Pending Requests</h3>
                <p>3</p>
            </div>
        </div>

        <!-- Additional content -->
        <div style="margin-top: 40px;">
            <h2>Recent Activity</h2>
            <table style="width:100%; border-collapse: collapse;">
                <tr style="background-color:#ecf0f1;">
                    <th style="padding: 10px; border: 1px solid #ccc;">User</th>
                    <th style="padding: 10px; border: 1px solid #ccc;">Action</th>
                    <th style="padding: 10px; border: 1px solid #ccc;">Date</th>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ccc;">John Doe</td>
                    <td style="padding: 10px; border: 1px solid #ccc;">Joined Yoga Class</td>
                    <td style="padding: 10px; border: 1px solid #ccc;">2025-11-17</td>
                </tr>
                <tr>
                    <td style="padding: 10px; border: 1px solid #ccc;">Jane Smith</td>
                    <td style="padding: 10px; border: 1px solid #ccc;">Purchased Membership</td>
                    <td style="padding: 10px; border: 1px solid #ccc;">2025-11-16</td>
                </tr>
            </table>
        </div>

    </div>

</body>
</html>
