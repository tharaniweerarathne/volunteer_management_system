<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 180px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #16a085;
            padding-top: 20px;
            color: white;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background-color: #1abc9c;
        }

        /* Main content */
        .main-content {
            margin-left: 180px;
            padding: 20px;
        }

        /* Top navbar */
        .topnav {
            height: 60px;
            background-color: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #ccc;
        }

        .topnav h1 {
            margin: 0;
            font-size: 22px;
        }

        .topnav .user-info {
            font-size: 16px;
        }

        /* Dashboard cards */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: white;
            flex: 1 1 180px;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 18px;
            margin: 0;
            font-weight: bold;
        }

        /* Table styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background-color: #ecf0f1;
        }

        button {
            padding: 6px 12px;
            background-color: #16a085;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1abc9c;
        }

    </style>
</head>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Volunteer</h2>
        <a href="#">Dashboard</a>
        <a href="#">My Tasks</a>
        <a href="#">Events</a>
        <a href="#">Reports</a>
        <a href="#">Profile</a>
        <a href="#">Logout</a>
    </div>
